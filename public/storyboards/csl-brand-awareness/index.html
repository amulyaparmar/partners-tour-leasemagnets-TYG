<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CSL National Campaign Storyboards</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0c0c0c;
      --ink: #fffdf8;
      --muted: rgba(255, 253, 248, 0.72);
      --accent: #f0b747;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background:
        radial-gradient(circle at 18% 0%, rgba(41, 58, 104, 0.52), transparent 34%),
        linear-gradient(135deg, rgba(239, 39, 38, 0.16), transparent 26%),
        linear-gradient(315deg, rgba(240, 183, 71, 0.16), transparent 34%),
        #0c0c0c;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      overscroll-behavior: none;
    }
    body:focus { outline: none; }
    .deck {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: clamp(12px, 2vw, 28px);
      outline: none;
    }
    .slide {
      position: absolute;
      width: min(100vw - 32px, calc((100vh - 58px) * 16 / 9));
      aspect-ratio: 16 / 9;
      opacity: 0;
      transform: translateX(52px) scale(0.985);
      transition: opacity 220ms ease, transform 260ms ease;
      pointer-events: none;
      filter: drop-shadow(0 22px 52px rgba(0, 0, 0, 0.52));
    }
    .slide.active {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }
    .slide.prev { transform: translateX(-52px) scale(0.985); }
    .slide img {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      user-select: none;
      -webkit-user-drag: none;
    }
    .edge {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 22vw;
      min-width: 176px;
      border: 0;
      color: rgba(246, 241, 232, 0.92);
      background: transparent;
      cursor: pointer;
      opacity: 0;
      transition: opacity 160ms ease, background 160ms ease;
      z-index: 10;
      font-size: clamp(42px, 5vw, 76px);
      font-weight: 700;
    }
    .edge.prev { left: 0; }
    .edge.next { right: 0; }
    .edge:hover,
    .edge:focus-visible {
      opacity: 1;
      outline: none;
    }
    .edge.prev:hover,
    .edge.prev:focus-visible { background: linear-gradient(90deg, rgba(0,0,0,.32), transparent); }
    .edge.next:hover,
    .edge.next:focus-visible { background: linear-gradient(270deg, rgba(0,0,0,.32), transparent); }
    .edge span {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
    }
    .edge.prev span { left: 28px; }
    .edge.next span { right: 28px; }
    .nav {
      position: fixed;
      left: 50%;
      bottom: 17px;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(18px);
      z-index: 20;
    }
    .dot {
      width: 10px;
      height: 10px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: rgba(246, 241, 232, 0.42);
      cursor: pointer;
    }
    .dot.active {
      width: 28px;
      background: var(--accent);
    }
    .step-nav {
      position: fixed;
      right: 20px;
      bottom: 17px;
      display: flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.14);
      z-index: 20;
      backdrop-filter: blur(16px);
    }
    .step-button {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 999px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.10);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      transition: background 160ms ease, transform 160ms ease;
    }
    .step-button:hover,
    .step-button:focus-visible {
      background: rgba(240, 183, 71, 0.32);
      outline: none;
      transform: translateY(-1px);
    }
    .refs-button {
      position: fixed;
      left: 20px;
      bottom: 17px;
      height: 48px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      padding: 0 16px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(16px);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      z-index: 20;
      transition: background 160ms ease, transform 160ms ease;
    }
    .refs-button:hover,
    .refs-button:focus-visible {
      background: rgba(240, 183, 71, 0.28);
      outline: none;
      transform: translateY(-1px);
    }
    .refs-modal[hidden] { display: none; }
    .refs-modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 64px);
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(20px);
      z-index: 50;
    }
    .refs-panel {
      width: min(1180px, 100%);
      max-height: min(760px, calc(100vh - 64px));
      overflow: auto;
      border: 1px solid rgba(240, 183, 71, 0.30);
      border-radius: 10px;
      background: #08090b;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.62);
    }
    .refs-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 18px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.10);
    }
    .refs-title {
      margin: 0;
      color: var(--ink);
      font-size: 16px;
      letter-spacing: 0;
    }
    .refs-close {
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
    }
    .refs-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      background: rgba(255, 255, 255, 0.10);
    }
    .ref-card {
      min-width: 0;
      padding: 18px;
      background: #0d1118;
    }
    .ref-card h3 {
      margin: 0 0 10px;
      color: var(--ink);
      font-size: 14px;
      letter-spacing: 0;
    }
    .ref-card iframe,
    .ref-card video {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      border-radius: 8px;
      background: #000;
    }
    .ref-card a {
      display: inline-block;
      margin-top: 10px;
      color: var(--accent);
      font-size: 12px;
      text-decoration: none;
    }
    @media (max-width: 720px) {
      .step-nav {
        right: 12px;
        bottom: 12px;
      }
      .refs-button {
        left: 12px;
        bottom: 12px;
        width: 48px;
        justify-content: center;
        padding: 0;
        font-size: 0;
      }
      .refs-button span { font-size: 14px; }
      .refs-grid { grid-template-columns: 1fr; }
      .edge { min-width: 96px; }
    }
  </style>
</head>
<body tabindex="0">
  <main class="deck" aria-live="polite" tabindex="0">
    <section class="slide"><img data-slide="01_testimonial_anthem.jpg" alt="01 testimonial anthem"></section>
    <section class="slide"><img data-slide="02_hype_action_hook.jpg" alt="02 hype action hook"></section>
    <section class="slide"><img data-slide="03_community_find_your_people.jpg" alt="03 community find your people"></section>
    <section class="slide"><img data-slide="04_national_search_momentum.jpg" alt="04 national search momentum"></section>
    <section class="slide"><img data-slide="05_life_perks_day_in_the_life.jpg" alt="05 life perks day in the life"></section>
  </main>
  <button class="edge prev" type="button" aria-label="Previous storyboard"><span>&lsaquo;</span></button>
  <button class="edge next" type="button" aria-label="Next storyboard"><span>&rsaquo;</span></button>
  <nav class="nav" aria-label="Storyboard navigation"><button class="dot" type="button" aria-label="Go to storyboard 1"></button>
    <button class="dot" type="button" aria-label="Go to storyboard 2"></button>
    <button class="dot" type="button" aria-label="Go to storyboard 3"></button>
    <button class="dot" type="button" aria-label="Go to storyboard 4"></button>
    <button class="dot" type="button" aria-label="Go to storyboard 5"></button></nav>
  <button class="refs-button" type="button" aria-haspopup="dialog" aria-controls="reference-videos"><span aria-hidden="true">PLAY</span> refs</button>
  <div class="step-nav" aria-label="Slide controls">
    <button class="step-button step-prev" type="button" aria-label="Previous storyboard"><span aria-hidden="true">&larr;</span></button>
    <button class="step-button step-next" type="button" aria-label="Next storyboard"><span aria-hidden="true">&rarr;</span></button>
  </div>
  <section class="refs-modal" id="reference-videos" role="dialog" aria-modal="true" aria-label="Playable reference videos" hidden>
    <div class="refs-panel">
      <div class="refs-head">
        <h2 class="refs-title">Playable Reference Videos</h2>
        <button class="refs-close" type="button" aria-label="Close reference videos">&times;</button>
      </div>
      <div class="refs-grid">
        <article class="ref-card">
          <h3>Testimonial Anthem</h3>
          <iframe data-src="https://drive.google.com/file/d/18zY5IenwHJPsBFUPkZWFFf9JgnoJenfT/preview" allow="autoplay; fullscreen" allowfullscreen loading="lazy"></iframe>
          <a href="https://drive.google.com/file/d/18zY5IenwHJPsBFUPkZWFFf9JgnoJenfT/view?usp=drive_link" target="_blank" rel="noreferrer">Open source video</a>
        </article>
        <article class="ref-card">
          <h3>Hype Action Hook</h3>
          <video controls preload="metadata" src="https://storage.googleapis.com/leasemagnets---dummy-db.appspot.com/community/482/magnet/7a59b4b4-5c04-476b-adc1-4138d0ccce5f/category/intro/screen/main/Reflection%20Atlanta_intro_v3_2023.mp4?"></video>
          <a href="https://storage.googleapis.com/leasemagnets---dummy-db.appspot.com/community/482/magnet/7a59b4b4-5c04-476b-adc1-4138d0ccce5f/category/intro/screen/main/Reflection%20Atlanta_intro_v3_2023.mp4?" target="_blank" rel="noreferrer">Open source video</a>
        </article>
        <article class="ref-card">
          <h3>Landscape Polish</h3>
          <iframe data-src="https://drive.google.com/file/d/1_KzrQS5afjkECGzthXMtQax4f0NdZCRk/preview" allow="autoplay; fullscreen" allowfullscreen loading="lazy"></iframe>
          <a href="https://drive.google.com/file/d/1_KzrQS5afjkECGzthXMtQax4f0NdZCRk/view" target="_blank" rel="noreferrer">Open source video</a>
        </article>
      </div>
    </div>
  </section>
  <script>
    const slides = [...document.querySelectorAll('.slide')];
    const dots = [...document.querySelectorAll('.dot')];
    const deck = document.querySelector('.deck');
    const refsModal = document.querySelector('.refs-modal');
    const refsButton = document.querySelector('.refs-button');
    const refsClose = document.querySelector('.refs-close');
    const activeKeys = new Set();
    const slideBase = window.location.protocol === 'file:' ? 'slides/' : '/storyboards/csl-brand-awareness/slides/';
    let index = Math.max(0, Math.min(slides.length - 1, Number(location.hash.replace('#', '')) - 1 || 0));
    let touchStartX = 0;
    let touchStartY = 0;

    document.querySelectorAll('img[data-slide]').forEach((image) => {
      image.src = `${slideBase}${image.dataset.slide}`;
    });

    function focusDeck() {
      requestAnimationFrame(() => {
        window.focus();
        deck.focus({ preventScroll: true });
        document.body.focus({ preventScroll: true });
      });
    }

    function show(next) {
      index = (next + slides.length) % slides.length;
      slides.forEach((slide, i) => {
        slide.classList.toggle('active', i === index);
        slide.classList.toggle('prev', i < index || (index === 0 && i === slides.length - 1));
      });
      dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
      history.replaceState(null, '', `#${index + 1}`);
      focusDeck();
    }

    function advance(delta) {
      show(index + delta);
    }

    function keyIntent(event) {
      const key = event.key;
      const code = event.code;
      if (['ArrowRight', 'PageDown', ' ', 'Spacebar', 'n', 'N', 'd', 'D', 'j', 'J'].includes(key) || ['ArrowRight', 'PageDown', 'Space', 'KeyN', 'KeyD', 'KeyJ'].includes(code)) return 1;
      if (['ArrowLeft', 'PageUp', 'Backspace', 'p', 'P', 'a', 'A', 'k', 'K'].includes(key) || ['ArrowLeft', 'PageUp', 'Backspace', 'KeyP', 'KeyA', 'KeyK'].includes(code)) return -1;
      if (key === 'Home') return 'home';
      if (key === 'End') return 'end';
      return 0;
    }

    function handleKeydown(event) {
      if (!refsModal.hidden) {
        if (event.key === 'Escape') closeRefs();
        return;
      }
      const intent = keyIntent(event);
      if (!intent) return;
      event.preventDefault();
      event.stopPropagation();
      const keyId = event.code || event.key;
      if (activeKeys.has(keyId) && event.repeat) return;
      activeKeys.add(keyId);
      if (intent === 'home') return show(0);
      if (intent === 'end') return show(slides.length - 1);
      advance(intent);
    }

    function handleKeyup(event) {
      activeKeys.delete(event.code || event.key);
    }

    window.addEventListener('keydown', handleKeydown, true);
    document.addEventListener('keydown', handleKeydown, true);
    window.addEventListener('keyup', handleKeyup, true);
    document.addEventListener('keyup', handleKeyup, true);

    document.addEventListener('touchstart', (event) => {
      const touch = event.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    document.addEventListener('touchend', (event) => {
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;
      if (Math.abs(dx) > 48 && Math.abs(dx) > Math.abs(dy)) advance(dx < 0 ? 1 : -1);
    }, { passive: true });

    function openRefs() {
      refsModal.hidden = false;
      refsModal.querySelectorAll('iframe[data-src]').forEach((frame) => {
        if (!frame.getAttribute('src')) frame.setAttribute('src', frame.dataset.src);
      });
      refsClose.focus({ preventScroll: true });
    }

    function closeRefs() {
      refsModal.hidden = true;
      refsModal.querySelectorAll('video').forEach((video) => video.pause());
      refsModal.querySelectorAll('iframe[data-src]').forEach((frame) => frame.setAttribute('src', ''));
      focusDeck();
    }

    document.querySelectorAll('.edge.prev, .step-prev').forEach((button) => button.addEventListener('click', () => advance(-1)));
    document.querySelectorAll('.edge.next, .step-next').forEach((button) => button.addEventListener('click', () => advance(1)));
    refsButton.addEventListener('click', openRefs);
    refsClose.addEventListener('click', closeRefs);
    refsModal.addEventListener('click', (event) => {
      if (event.target === refsModal) closeRefs();
    });
    document.addEventListener('click', (event) => {
      if (refsModal.hidden && !refsButton.contains(event.target)) focusDeck();
    });
    window.addEventListener('hashchange', () => {
      const hashIndex = Number(location.hash.replace('#', '')) - 1;
      if (Number.isFinite(hashIndex)) show(hashIndex);
    });
    dots.forEach((dot, i) => dot.addEventListener('click', () => show(i)));
    show(index);
    focusDeck();
  </script>
</body>
</html>
