<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Westhome 3-Property Video Quote</title>
  <meta name="description" content="A premium three-property video quote for Mariah and Marge with an optional 60-second property video add-on.">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #183629;
      color: #fffff7;
      font-family: Arial, sans-serif;
    }
    a { color: #f0ddc0; }
  </style>
</head>
<body>
  <p>Loading the updated Westhome proposal...</p>
  <script>
    fetch('/quotes-shared/mariah-marge-three-property-video-quote.html', { cache: 'no-store' })
      .then((response) => response.text())
      .then((html) => {
        document.open();
        document.write(html);
        document.close();
      })
      .catch(() => {
        document.body.innerHTML = '<p><a href="/quotes-shared/mariah-marge-three-property-video-quote.html">Open the updated Westhome proposal</a></p>';
      });
  </script>
</body>
</html>
